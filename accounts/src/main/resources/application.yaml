spring:
  application:
    name: accounts

  datasource:
    url: jdbc:h2:mem:accountdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
#      ddl-auto: update
      ddl-auto: validate
  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.cache: TRACE

server:
  port: 8081