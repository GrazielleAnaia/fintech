spring:
  application:
    name: payment
  kafka:
    bootstrap-servers: localhost:9092,localhost:9094,localhost:9096
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
#      properties:
#        spring:
#          json:
#            add:
#              type:
#                headers: true

    consumer:
      group-id: payment-group
      properties:
        spring:
          json:
            add.type.headers: true
#              type:
#                headers: true
            trusted:
              packages: com.grazielleanaia.payment.dto,com.grazielleanaia.accounts.dto
#            value:
#              default:
#                type: com.grazielleanaia.payment.dto.PaymentCompletedEvent

  datasource:
    url: jdbc:h2:mem:paymentdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082